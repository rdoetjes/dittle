name: CI

on:
  push:
    branches: ["**"] # All branches (you can also remove this section for all pushes)
  pull_request:
    branches: [main] # PRs targeting main

jobs:
  ci:
    runs-on: ubuntu-latest
    #runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v4

      - name: Check for leaks in the code
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y gitleaks
          gitleaks detect --source $GITHUB_WORKSPACE --log-opts="-p -n 1"

      - name: check supply chain attacks
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
          echo "Creating SBOM..."
          syft scan . --source-name "dittle" --source-version $GITHUB_SHA --output cyclonedx-json@1.5=sbom.cdx.json
          echo "Running vulnerability scan..."
          grype sbom.cdx.json

  build_artifacts:
    needs: ci
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar

      - name: Make Dist
        run: make dist

      - name: Generate SBOMs for each artifact
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          mkdir -p dist/sboms
          for file in dist/*.{zip,tar.gz}; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            echo "Generating SBOM for $filename"
            syft "$file" --source-name "dittle" --output cyclonedx-json@1.5="dist/sboms/${filename}.sbom.json"
          done

      - name: Upload to Artifactory and Vault
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          # Get credentials from Vault
          pass=$(curl --fail -s -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN }}" "${{ vars.VAULT_ADDR }}/v1/kv/data/prod/artifactory/ci" | jq -r '.data.data.password')
          iso=$(date +%Y%m%d%H%M)
          
          # Base URL for Artifactory
          BASE_URL="https://stratos01.phonax.com/artifactory/internal_test/dittle/$GITHUB_SHA"

          # Upload artifacts
          for file in dist/*.{zip,tar.gz}; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            
            # Add timestamp to filename before extension
            if [[ $filename == *.tar.gz ]]; then
              new_name="${filename%.tar.gz}-$iso.tar.gz"
            else
              new_name="${filename%.zip}-$iso.zip"
            fi

            MD5=$(md5sum "$file" | awk '{print $1}')
            SHA1=$(sha1sum "$file" | awk '{print $1}')
            
            echo "Uploading $filename as $new_name"
            curl --fail-with-body -s -u "ci:$pass" -X PUT -T "$file" \
              -H "X-Checksum-Md5: $MD5" -H "X-Checksum-Sha1: $SHA1" \
              "$BASE_URL/$new_name"
          done

          # Upload SBOMs
          for file in dist/sboms/*.json; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            # dittle-linux-x64.tar.gz.sbom.json -> dittle-linux-x64-sbom-timestamp.json
            new_name="${filename%.sbom.json}"
            if [[ $new_name == *.tar.gz ]]; then
              new_name="${new_name%.tar.gz}"
            else
              new_name="${new_name%.zip}"
            fi
            new_name="${new_name}-sbom-$iso.json"

            MD5=$(md5sum "$file" | awk '{print $1}')
            SHA1=$(sha1sum "$file" | awk '{print $1}')
            
            echo "Uploading SBOM $filename as $new_name"
            curl --fail-with-body -s -u "ci:$pass" -X PUT -T "$file" \
              -H "X-Checksum-Md5: $MD5" -H "X-Checksum-Sha1: $SHA1" \
              "$BASE_URL/$new_name"
          done
